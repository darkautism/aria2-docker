name: Build Aria2 Nightly

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ARIA2_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set platform tag
        run: |
          echo "PLATFORM_TAG=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Set date
        run: |
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            ARIA2_VERSION=master
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.PLATFORM_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.DATE }}-${{ env.PLATFORM_TAG }}
          cache-from: type=gha,scope=nightly-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=nightly-${{ matrix.platform }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Set date
        run: |
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-linux-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly

          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.DATE }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.DATE }}-linux-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.DATE }}-linux-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nightly-${{ env.DATE }}